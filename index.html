<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no"/>
  <title>Solar System VR</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <!-- Loading screen -->
  <div id="loadingScreen">
    <div id="loadingContent">
      <div id="loadingTitle">Solar System</div>
      <div id="loadingBarWrap"><div id="loadingBar"></div></div>
      <div id="loadingLabel">Lade Texturen…</div>
    </div>
  </div>

  <canvas id="c"></canvas>
  <div id="crosshair"></div>

  <button id="backBtn"  onclick="flyBack()">← Zurück</button>
  <button id="vrToggle" onclick="toggleVR()">🥽 VR-Modus</button>
  <button id="gyroBtn"  onclick="requestGyro()">📱 Gyroskop erlauben</button>

  <div id="controls">
    <button class="btn" id="btnS" onclick="setMode('stop')"   >⏸ Stop     <kbd>[S]</kbd></button>
    <button class="btn" id="btnN" onclick="setMode('normal')" >▶ Normal   <kbd>[Space]</kbd></button>
    <button class="btn" id="btnF" onclick="setMode('fast')"   >⏩ Schnell  <kbd>[A]</kbd></button>
    <span id="modeLabel"></span>
  </div>

  <div id="hint">Klick auf Planet/Sonne = Detailansicht · Scroll = Zoom · Ziehen = Schwenken</div>

  <div id="infoSymbol"></div>
  <!-- Info Card -->
  <div id="infoCard">
    <button id="infoCardClose" onclick="hideInfoCard()">✕</button>
    <div id="infoCardName"></div>
    <div id="infoCardType"></div>
    <div id="infoCardStats"></div>
    <div id="infoCardFakt"></div>
  </div>


  <!-- Textures (base64 embedded) -->
  <script src="textures_b64.js"></script>

  <!-- Three.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- App modules — order matters! -->
  <script src="js/planets.js"></script>
  <script src="js/textures.js"></script>
  <script src="js/scene.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/controls.js"></script>
  <script src="js/camera.js"></script>
  <script src="js/extras.js"></script>
  <script src="js/infoPanel3D.js"></script>
  <script src="js/modes.js"></script>
  <script src="js/vr.js"></script>
  <script src="js/main.js"></script>

</body>
</html>
